spring.application.name=monument-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/monumentdb
spring.datasource.username=postgres
spring.datasource.password=Siri@2007
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=false

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true